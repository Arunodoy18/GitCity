name: Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of GitCity would this affect?
      options:
        - Frontend (WebGL city)
        - Backend (API server)
        - Engine (@gitcity/engine)
        - SDK (gitcity-sdk)
        - Plugin System
        - Documentation
        - DevOps / Infrastructure
        - New Component
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Important
        - Critical for my use case

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: Add mockups, diagrams, or links to similar features in other projects.

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context about the feature request.
