<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitCity — Team Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #060610; color: #fff; font-family: system-ui, sans-serif; }
    .layout { display: flex; height: 100vh; }
    .sidebar {
      width: 320px; padding: 20px;
      background: rgba(255,255,255,0.02);
      border-right: 1px solid rgba(255,255,255,0.06);
      overflow-y: auto;
    }
    .sidebar h1 { font-size: 16px; font-weight: 800; letter-spacing: 2px; margin-bottom: 16px; }
    #city-container { flex: 1; }
    .team-input {
      width: 100%; margin-bottom: 12px;
    }
    .team-input textarea {
      width: 100%; height: 100px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 10px;
      color: #fff; font-size: 13px; font-family: monospace;
      resize: vertical; outline: none;
    }
    button {
      width: 100%;
      background: rgba(88,166,255,0.15);
      border: 1px solid rgba(88,166,255,0.3);
      border-radius: 8px; padding: 10px;
      color: #58a6ff; font-weight: 600; cursor: pointer;
      font-size: 13px; margin-bottom: 20px;
    }
    button:hover { background: rgba(88,166,255,0.25); }
    .stats {
      border-top: 1px solid rgba(255,255,255,0.06);
      padding-top: 16px;
    }
    .stats h2 { font-size: 12px; color: #667; letter-spacing: 1.5px; margin-bottom: 10px; }
    .member {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .member-name { font-size: 13px; font-weight: 600; }
    .member-score { font-size: 11px; color: #58a6ff; margin-left: auto; }
  </style>
</head>
<body>
  <div class="layout">
    <div class="sidebar">
      <h1>👥 TEAM DASHBOARD</h1>

      <div class="team-input">
        <textarea id="members" placeholder="One username per line...">torvalds
gaearon
sindresorhus
tj
yyx990803</textarea>
      </div>
      <button id="build-btn">Build Team City</button>

      <div class="stats">
        <h2>TEAM MEMBERS</h2>
        <div id="member-list"></div>
      </div>
    </div>

    <div id="city-container"></div>
  </div>

  <script type="module">
    import { GitCity } from '../../sdk/src/index.js'

    let city = null

    document.getElementById('build-btn').addEventListener('click', async () => {
      const text = document.getElementById('members').value
      const users = text.split('\n').map(u => u.trim()).filter(Boolean)
      if (users.length === 0) return

      if (city) city.dispose()

      city = new GitCity({
        users,
        apiUrl: 'http://localhost:5000',
        autoRotate: true,
      })

      await city.render('#city-container')

      // Populate sidebar stats
      city.on('loaded', (data) => {
        const list = document.getElementById('member-list')
        list.innerHTML = ''
        const members = data?.users || (Array.isArray(data) ? data : [data])
        members.forEach(u => {
          const div = document.createElement('div')
          div.className = 'member'
          div.innerHTML = `
            <div class="member-name">${u.username || u.login || 'unknown'}</div>
            <div class="member-score">${u.commits || u.metrics?.commits || '—'} commits</div>
          `
          list.appendChild(div)
        })
      })

      city.on('buildingClick', (user) => {
        console.log('Selected:', user)
      })
    })
  </script>
</body>
</html>
